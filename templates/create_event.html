```html
{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">Создание события</h3>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('create_event', org_id=request.view_args.org_id) }}">
                        <div class="form-group mb-3">
                            <label for="name">Название события *</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>

                        <div class="form-group mb-3">
                            <label for="description">Описание</label>
                            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="city">Город</label>
                                    <input type="text" class="form-control" id="city" name="city">
                                </div>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="datetime">Дата и время *</label>
                                    <input type="datetime-local" class="form-control" id="datetime" 
                                           name="datetime" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="hours">Часы *</label>
                                    <input type="number" class="form-control" id="hours" name="hours" 
                                           step="0.5" min="0" required>
                                    <small class="form-text text-muted">Укажите продолжительность в часах</small>
                                </div>
                            </div>
                        </div>

                        <div class="form-group text-center mt-4">
                            <button type="submit" class="btn btn-success btn-block">
                                Создать событие
                            </button>
                        </div>

                        <div class="text-center mt-3">
                            <a href="{{ url_for('organization_events', org_id=request.view_args.org_id) }}" 
                               class="btn btn-secondary">
                                Назад
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
```
