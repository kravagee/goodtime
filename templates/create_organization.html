{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">Создание организации</h3>
                </div>
                <div class="card-body">
                    {% if error %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        {{ error }}
                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    {% endif %}
                    
                    <form method="POST" action="{{ url_for('create_organization') }}">
                        <div class="form-group">
                            <label for="name">Название организации</label>
                            <input type="text" class="form-control" id="name" name="name" 
                                   required>
                            <small class="form-text text-muted">Введите уникальное название для вашей организации</small>
                        </div>

                        <div class="form-group text-center">
                            <button type="submit" class="btn btn-success btn-block">Создать организацию</button>
                        </div>

                        <div class="text-center mt-3">
                            <a href="{{ url_for('home') }}" class="btn btn-secondary">Назад</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
